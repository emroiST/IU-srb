        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #4a4a6a;
            margin-bottom: 30px;
        }

        header h1 {
            color: #7ec850;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            color: #888;
            font-size: 1.1em;
        }

        .search-box {
            width: 100%;
            max-width: 500px;
            margin: 20px auto;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #4a4a6a;
            border-radius: 25px;
            background: #2a2a4a;
            color: #e0e0e0;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            border-color: #7ec850;
        }

        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .category-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            background: #2a2a4a;
            color: #e0e0e0;
            border: 2px solid #4a4a6a;
        }

        .category-btn:hover {
            transform: translateY(-2px);
        }

        .category-btn.active {
            background: #7ec850;
            color: #1a1a2e;
            border-color: #7ec850;
        }

        .category-btn[data-category="base"] { background: #5c7c64; }
        .category-btn[data-category="base"].active { background: #7ec850; color: #1a1a2e; }
        
        .category-btn[data-category="crops"] { background: #8b5a3a; }
        .category-btn[data-category="crops"].active { background: #c8a882; color: #1a1a2e; }
        
        .category-btn[data-category="metals"] { background: #4a6a8a; }
        .category-btn[data-category="metals"].active { background: #6aa8c8; color: #1a1a2e; }
        
        .category-btn[data-category="rare"] { background: #6a4a8a; }
        .category-btn[data-category="rare"].active { background: #a86ac8; color: #1a1a2e; }
        
        .category-btn[data-category="radioactive"] { background: #8a6a4a; }
        .category-btn[data-category="radioactive"].active { background: #c8a86a; color: #1a1a2e; }
        
        .category-btn[data-category="ender"] { background: #4a8a6a; }
        .category-btn[data-category="ender"].active { background: #6ac8a8; color: #1a1a2e; }
        
        .category-btn[data-category="nuclear"] { background: #8a4a4a; }
        .category-btn[data-category="nuclear"].active { background: #c86a6a; color: #1a1a2e; }

        .plants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .plant-card {
            background: #2a2a4a;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #4a4a6a;
        }

        .plant-card:hover {
            transform: translateY(-5px);
            border-color: #7ec850;
            box-shadow: 0 10px 30px rgba(126, 200, 80, 0.2);
        }

        .plant-card h3 {
            color: #7ec850;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .plant-card .id {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .plant-card .soil {
            color: #aaa;
            font-size: 0.85em;
            padding: 5px 10px;
            background: #1a1a2e;
            border-radius: 5px;
            display: inline-block;
        }

        .plant-card .category-tag {
            float: right;
            font-size: 0.75em;
            padding: 3px 8px;
            border-radius: 10px;
            background: #4a4a6a;
            color: #ccc;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            overflow-y: auto;
        }

        .modal-overlay.active {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .modal {
            background: #2a2a4a;
            border-radius: 20px;
            max-width: 900px;
            width: 100%;
            margin: 40px auto;
            border: 2px solid #7ec850;
            box-shadow: 0 20px 60px rgba(126, 200, 80, 0.3);
        }

        .modal-header {
            padding: 25px;
            border-bottom: 2px solid #4a4a6a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            color: #7ec850;
            font-size: 1.8em;
        }

        .close-btn {
            background: none;
            border: none;
            color: #888;
            font-size: 2em;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: #7ec850;
        }

        .modal-body {
            padding: 25px;
        }

        .plant-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .info-item {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 10px;
        }

        .info-item label {
            color: #888;
            font-size: 0.85em;
            display: block;
            margin-bottom: 5px;
        }

        .info-item span {
            color: #e0e0e0;
            font-size: 1.1em;
        }

        .recipe-section {
            margin-top: 30px;
        }

        .recipe-section h3 {
            color: #c8a882;
            margin-bottom: 20px;
            font-size: 1.4em;
        }

        .recipe-tree {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 20px;
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
        }

        .tree-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tree-control-btn {
            padding: 6px 12px;
            font-size: 0.85em;
            border: 1px solid #4a4a6a;
            border-radius: 6px;
            background: #2a2a4a;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tree-control-btn:hover {
            background: #3a3a5a;
            border-color: #7ec850;
        }

        .tree-node {
            margin: 4px 0;
        }

        .tree-node-content {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
            user-select: none;
        }

        .tree-node-content:hover {
            transform: translateX(3px);
            box-shadow: 0 2px 8px rgba(126, 200, 80, 0.3);
        }

        .tree-node-content.root {
            background: linear-gradient(135deg, #7ec850 0%, #5a9a3a 100%);
            color: #1a1a2e;
            font-size: 1em;
        }

        .tree-node-content.base {
            background: linear-gradient(135deg, #5c7c64 0%, #4a6a52 100%);
            color: #fff;
        }

        .tree-node-content.intermediate {
            background: linear-gradient(135deg, #8a6ac8 0%, #6a4aa8 100%);
            color: #fff;
        }

        .tree-children {
            margin-left: 18px;
            padding-left: 12px;
            border-left: 2px solid #4a4a6a;
        }

        .tree-children.collapsed {
            display: none;
        }

        .tree-branch {
            display: flex;
            align-items: center;
            margin: 3px 0;
        }

        .tree-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            border-radius: 4px;
            background: #4a4a6a;
            color: #fff;
            font-size: 0.8em;
            cursor: pointer;
            margin-right: 6px;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .tree-toggle:hover {
            background: #7ec850;
            color: #1a1a2e;
        }

        .tree-toggle.collapsed {
            transform: rotate(-90deg);
        }

        .no-recipe {
            color: #888;
            font-style: italic;
            padding: 20px;
            text-align: center;
        }

        .ingredients {
            margin-top: 15px;
            padding: 15px;
            background: #2a2a4a;
            border-radius: 10px;
        }

        .ingredients h4 {
            color: #aaa;
            margin-bottom: 10px;
            font-size: 1em;
        }

        .ingredients-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .ingredient-item {
            padding: 8px 15px;
            background: #1a1a2e;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            border: 1px solid #4a4a6a;
            transition: all 0.3s;
        }

        .ingredient-item:hover {
            border-color: #7ec850;
            background: #3a3a5a;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .plants-grid {
                grid-template-columns: 1fr;
            }

            .modal {
                margin: 10px;
            }

            .tree-children {
                margin-left: 15px;
                padding-left: 10px;
            }
        }
    </style>
</head>

                    <div class="recipe-tree" id="recipeTree"></div>

                    <div class="ingredients-list" id="ingredientsList"></div>
                </div>
            </div>
        </div>
    </div>

            // Эндер и Незер
            71: { name: "Эндерская лилия", id: 71, soil: "Эндер руда", category: "ender", ingredients: [81, 64, 16, 18] },
            72: { name: "Ифритовая буря", id: 72, soil: "Песок душ", category: "ender", ingredients: [81, 43, 0, 73] },
            75: { name: "Гастовая роса", id: 75, soil: "Песок душ", category: "ender", ingredients: [72, 39, 74, 40] },
            76: { name: "Костяной лист", id: 76, soil: "Песок душ", category: "ender", ingredients: [81, 74, 51] },

            // Ядерные
            79: { name: "Америциевый мох", id: 79, soil: "Урановая руда", category: "nuclear", ingredients: [50, 81, 67] },
            78: { name: "Нептуний мудрости", id: 78, soil: "Урановая руда", category: "nuclear", ingredients: [79, 53, 55, 14] },
            77: { name: "Кюриевая ягода", id: 77, soil: "Урановая руда", category: "nuclear", ingredients: [64, 20, 50, 78] },
            80: { name: "Ториевый кулак", id: 80, soil: "Урановая руда", category: "nuclear", ingredients: [50, 35, 28] },
            82: { name: "Терра варт", id: 82, soil: "Песок душ", category: "nuclear", ingredients: [71, 75, 81] }
        };

        const categoryNames = {
            base: "🌿 Базовые",
            crops: "🌾 Растения",
            metals: "⚙️ Металлы",
            rare: "💎 Редкие",
            radioactive: "☢️ Радиоактивные",
            ender: "🔮 Эндер/Незер",
            nuclear: "🧬 Ядерные"
        };

        let currentFilter = 'all';
        let searchQuery = '';

        function renderPlants() {
            const grid = document.getElementById('plantsGrid');
            grid.innerHTML = '';

            const filteredPlants = Object.values(plantsData).filter(plant => {
                const matchesCategory = currentFilter === 'all' || plant.category === currentFilter;
                const matchesSearch = searchQuery === '' || 
                    plant.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    plant.id.toString().includes(searchQuery);
                return matchesCategory && matchesSearch;
            });

            filteredPlants.sort((a, b) => a.id - b.id);

            filteredPlants.forEach(plant => {
                const card = document.createElement('div');
                card.className = 'plant-card';
                card.innerHTML = `
                    <span class="category-tag">${categoryNames[plant.category]}</span>
                    <h3>${plant.name}</h3>
                    <div class="id">ID: ${plant.id}</div>
                    <div class="soil">🌍 ${plant.soil}</div>
                `;
                card.onclick = () => openModal(plant.id);
                grid.appendChild(card);
            });
        }

        function buildTree(plantId, visited = new Set()) {
            const plant = plantsData[plantId];
            if (!plant) return null;

            if (visited.has(plantId)) {
                return {
                    ...plant,
                    children: [],
                    isCircular: true
                };
            }

            visited.add(plantId);

            const children = plant.ingredients.map(ingId => buildTree(ingId, new Set(visited)));

            return {
                ...plant,
                children: children.filter(c => c !== null)
            };
        }

        function renderTreeNode(node, isRoot = false, depth = 0) {
            if (!node) return '';

            const hasChildren = node.children && node.children.length > 0;
            const toggleId = `toggle-${node.id}-${depth}`;
            
            let categoryClass;
            if (isRoot) {
                categoryClass = 'root';
            } else if (node.ingredients.length === 0) {
                categoryClass = 'base';
            } else {
                categoryClass = 'intermediate';
            }
            
            const baseText = node.ingredients.length === 0 ? ' <span style="opacity:0.7;font-weight:normal">(БАЗА)</span>' : '';
            const toggle = hasChildren ? `<span class="tree-toggle" onclick="toggleTree(event, '${toggleId}')">▼</span>` : '<span style="display:inline-block;width:16px;height:16px;margin-right:6px;"></span>';
            
            let html = `
                <div class="tree-node">
                    ${isRoot ? '' : '<div class="tree-branch"></div>'}
                    <div class="tree-node-content ${categoryClass}" onclick="openModal(${node.id})">
                        ${toggle}${node.name}${baseText}
                    </div>
            `;

            if (hasChildren) {
                html += `<div class="tree-children" id="${toggleId}">`;
                node.children.forEach(child => {
                    html += renderTreeNode(child, false, depth + 1);
                });
                html += '</div>';
            }

            html += '</div>';
            return html;
        }

        function openModal(plantId) {
            const plant = plantsData[plantId];
            if (!plant) return;

            document.getElementById('modalTitle').textContent = plant.name;
            document.getElementById('modalId').textContent = plant.id;
            document.getElementById('modalSoil').textContent = plant.soil;
            document.getElementById('modalCategory').textContent = categoryNames[plant.category];

            const tree = buildTree(plantId);
            const treeContainer = document.getElementById('recipeTree');
            
            if (tree && tree.children.length > 0) {
                treeContainer.innerHTML = renderTreeNode(tree, true);
            } else {
                treeContainer.innerHTML = '<div class="no-recipe">🌱 Базовое растение — не требует скрещивания</div>';
            }

            const ingredientsSection = document.getElementById('ingredientsSection');
            const ingredientsList = document.getElementById('ingredientsList');
            
            if (plant.ingredients && plant.ingredients.length > 0) {
                ingredientsSection.style.display = 'block';
                ingredientsList.innerHTML = plant.ingredients.map(ingId => {
                    const ing = plantsData[ingId];
                    return `<span class="ingredient-item" onclick="openModal(${ingId})">${ing ? ing.name : 'Unknown'}</span>`;
                }).join('');
            } else {
                ingredientsSection.style.display = 'none';
            }

            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function toggleTree(event, toggleId) {
            event.stopPropagation();
            const children = document.getElementById(toggleId);
            const toggle = event.target;
            if (children) {
                children.classList.toggle('collapsed');
                toggle.classList.toggle('collapsed');
                toggle.textContent = toggle.classList.contains('collapsed') ? '▶' : '▼';
            }
        }

        function expandAll() {
            document.querySelectorAll('.tree-children.collapsed').forEach(el => {
                el.classList.remove('collapsed');
            });
            document.querySelectorAll('.tree-toggle.collapsed').forEach(el => {
                el.classList.remove('collapsed');
                el.textContent = '▼';
            });
        }

        function collapseAll() {
            document.querySelectorAll('.tree-children').forEach(el => {
                el.classList.add('collapsed');
            });
            document.querySelectorAll('.tree-toggle').forEach(el => {
                el.classList.add('collapsed');
                el.textContent = '▶';
            });
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) {
                closeModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.category;
                renderPlants();
            });
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderPlants();
        });

        renderPlants();
    </script>
</body>
</html>
